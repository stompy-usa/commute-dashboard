<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Commute snapshot</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Commute snapshot</h1>
      <div class="meta">
        <span id="period" class="period"></span>
        <span id="updated">Loading…</span>
        <span id="slot"></span>
      </div>
    </header>
    <main>
      <aside class="sidebar">
        <section id="summary" hidden></section>
        <section id="cards"></section>
      </aside>
      <div class="map-area">
        <section id="directions" hidden>
          <button type="button" id="dir-handle" aria-label="Toggle directions">
            <span class="dir-handle-bar"></span>
            <span class="dir-handle-arrow"></span>
          </button>
          <div class="dir-head">
            <div>
              <div class="dir-route" id="dir-route"></div>
              <div class="dir-sub" id="dir-sub"></div>
            </div>
            <button type="button" id="dir-close" aria-label="Close directions">&times;</button>
          </div>
          <ol id="dir-steps"></ol>
        </section>
        <section id="map"></section>
      </div>
    </main>
    <footer>
      <a href="https://github.com/">source</a>
      &middot; routes via TomTom &middot; tiles &copy;
      <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>
      contributors &copy;
      <a href="https://carto.com/attributions">CARTO</a>
    </footer>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
