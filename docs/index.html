<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Commute snapshot</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Commute snapshot</h1>
      <div class="meta">
        <span id="period" class="period"></span>
        <span id="updated">Loading…</span>
        <span id="slot"></span>
      </div>
    </header>
    <main>
      <aside class="sidebar">
        <section id="summary" hidden></section>
        <section id="cards"></section>
      </aside>
      <div class="map-area">
        <button type="button" id="cal-toggle" class="cal-toggle" aria-label="Toggle calendar" title="Commute calendar">
          <svg class="cal-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <rect x="3" y="5" width="18" height="16" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/>
            <line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/>
            <line x1="8" y1="3" x2="8" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="16" y1="3" x2="16" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button type="button" id="dir-toggle" class="dir-toggle" aria-label="Toggle directions" title="Directions">
          <span class="hamburger"><span></span><span></span><span></span></span>
        </button>
        <section id="calendar" hidden>
          <div class="cal-head">
            <button type="button" id="cal-prev" class="cal-nav" aria-label="Previous month">&#9664;</button>
            <div class="cal-title" id="cal-title"></div>
            <button type="button" id="cal-next" class="cal-nav" aria-label="Next month">&#9654;</button>
            <button type="button" id="cal-close" aria-label="Close calendar">&times;</button>
          </div>
          <div class="cal-weekdays">
            <span>M</span><span>T</span><span>W</span><span>Th</span><span>F</span>
          </div>
          <div class="cal-body" id="cal-body"></div>
          <div class="cal-legend">
            <span class="cal-sw cal-normal"></span><span class="cal-sw-label">Normal</span>
            <span class="cal-sw cal-moderate"></span><span class="cal-sw-label">Moderate</span>
            <span class="cal-sw cal-heavy"></span><span class="cal-sw-label">Heavy</span>
          </div>
        </section>
        <section id="directions" hidden>
          <div class="dir-head">
            <div>
              <div class="dir-route" id="dir-route"></div>
              <div class="dir-sub" id="dir-sub"></div>
            </div>
            <button type="button" id="dir-close" aria-label="Close directions">&times;</button>
          </div>
          <ol id="dir-steps"></ol>
        </section>
        <section id="map"></section>
      </div>
    </main>
    <footer>
      <a href="https://github.com/">source</a>
      &middot; routes via TomTom &middot; tiles &copy;
      <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>
      contributors &copy;
      <a href="https://carto.com/attributions">CARTO</a>
    </footer>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
