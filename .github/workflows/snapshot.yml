name: Commute snapshot

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass slot/workday guard (manual runs only)"
        type: boolean
        default: false
  schedule:
    # GitHub Actions cron is UTC-only and silently drops scheduled runs during
    # high cluster load (especially top-of-hour and :30). Each ET slot is fired
    # 3 times within slot_guard's 7-min tolerance window so a single drop
    # doesn't lose the snapshot. slot_guard.py picks the right slot label and
    # exits silently if the slot was already captured (so duplicate firings
    # don't double-commit).
    # EDT (Mar-Nov): 5:45, 6:00, 6:15, 6:30 ET
    - cron: "45,48,51 9 * * 1-5"
    - cron: "0,3,6 10 * * 1-5"
    - cron: "15,18,21 10 * * 1-5"
    - cron: "30,33,36 10 * * 1-5"
    # EST (Nov-Mar): same ET slots, +1 hour UTC
    - cron: "45,48,51 10 * * 1-5"
    - cron: "0,3,6 11 * * 1-5"
    - cron: "15,18,21 11 * * 1-5"
    - cron: "30,33,36 11 * * 1-5"

permissions:
  contents: write

concurrency:
  group: commute-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decide whether to run (ET slot + workday gate)
        id: guard
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "slot=manual" >> "$GITHUB_OUTPUT"
            echo "forced manual run"
            exit 0
          fi
          set +e
          slot=$(python scripts/slot_guard.py)
          code=$?
          set -e
          if [ $code -eq 10 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ $code -ne 0 ]; then
            exit $code
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "slot=$slot" >> "$GITHUB_OUTPUT"

      - name: Fetch routes from TomTom
        if: steps.guard.outputs.run == 'true'
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          HOME_COORDS: ${{ secrets.HOME_COORDS }}
          OFFICE_COORDS: ${{ secrets.OFFICE_COORDS }}
          ET_SLOT: ${{ steps.guard.outputs.slot }}
        run: python scripts/fetch_routes.py

      - name: Commit snapshot
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name  "commute-bot"
          git config user.email "commute-bot@users.noreply.github.com"
          git add docs/data/
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "snapshot: ${{ steps.guard.outputs.slot }} ET"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push rejected on attempt $attempt; rebasing onto origin/main"
            git pull --rebase origin main
          done
          echo "push failed after 3 attempts"
          exit 1
