name: Commute snapshot

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass slot/workday guard (manual runs only)"
        type: boolean
        default: false
      period:
        description: "Commute direction (only used with force=true)"
        type: choice
        options:
          - auto
          - home-to-office
          - office-to-home
        default: auto
  schedule:
    # GitHub Actions cron has a 5-min floor and silently drops firings under
    # load. Each window uses two staggered every-5-min lines (offset by 2 min)
    # across a 3-hour range that covers both EST and EDT. That gives every
    # real slot two firing chances within slot_guard's +/-2 min tolerance, so
    # a single drop still leaves a snapshot. slot_guard.py filters off-window
    # and already-captured firings.
    # Morning window: 5:45-6:30 ET (= 9:45-10:30 UTC EDT, 10:45-11:30 UTC EST)
    - cron: "*/5 9-11 * * 1-5"
    - cron: "2-57/5 9-11 * * 1-5"
    # Evening window: 3:15-4:00 PM ET (= 19:15-20:00 UTC EDT, 20:15-21:00 UTC EST)
    - cron: "*/5 19-21 * * 1-5"
    - cron: "2-57/5 19-21 * * 1-5"

permissions:
  contents: write

concurrency:
  group: commute-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decide whether to run (ET slot + workday gate)
        id: guard
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "slot=manual" >> "$GITHUB_OUTPUT"
            echo "forced manual run"
            exit 0
          fi
          set +e
          slot=$(python scripts/slot_guard.py)
          code=$?
          set -e
          if [ $code -eq 10 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ $code -ne 0 ]; then
            exit $code
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "slot=$slot" >> "$GITHUB_OUTPUT"

      - name: Fetch routes from TomTom
        if: steps.guard.outputs.run == 'true'
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          HOME_COORDS: ${{ secrets.HOME_COORDS }}
          OFFICE_COORDS: ${{ secrets.OFFICE_COORDS }}
          ET_SLOT: ${{ steps.guard.outputs.slot }}
          PERIOD_OVERRIDE: ${{ inputs.period }}
        run: python scripts/fetch_routes.py

      - name: Email commute summary (final slot or manual)
        if: steps.guard.outputs.run == 'true' && (steps.guard.outputs.slot == '06:30' || steps.guard.outputs.slot == '16:00' || steps.guard.outputs.slot == 'manual')
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/send_email.py

      - name: Commit snapshot
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name  "commute-bot"
          git config user.email "commute-bot@users.noreply.github.com"
          git add docs/data/
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "snapshot: ${{ steps.guard.outputs.slot }} ET"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push rejected on attempt $attempt; rebasing onto origin/main"
            git pull --rebase origin main
          done
          echo "push failed after 3 attempts"
          exit 1
